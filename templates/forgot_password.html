<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A2463">
  <title>Forgot Password - SocialPay</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-hero">
    <div class="auth-logo">Social<span>Pay</span></div>
    <div style="font-size:52px;margin:16px 0">🔑</div>
    <div style="font-size:18px;font-weight:800;color:white">Forgot Password</div>
    <div class="auth-tagline" style="margin-top:8px">Enter your email to receive a reset code</div>
  </div>

  <div class="auth-card">
    <div class="form-group">
      <label class="form-label">{{ t('email') }}</label>
      <input type="email" class="form-control" id="fp-email"
             placeholder="example@gmail.com" autocomplete="email">
    </div>

    <button class="btn btn-primary" id="fp-btn" onclick="doForgot()">
      📧 Send Reset OTP
    </button>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted)">
      <a href="/login" style="color:var(--accent);font-weight:700">← Back to Login</a>
    </p>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
async function doForgot() {
  const email = document.getElementById('fp-email').value.trim();
  if (!email) { showToast('{{ t("fill_all_fields") }}', 'warning'); return; }
  const fd = new FormData();
  fd.append('email', email);
  await postForm('/forgot_password', fd, document.getElementById('fp-btn'));
}
</script>
</body>
</html>
