<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A2463">
  <title>Reset Password - SocialPay</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-hero">
    <div class="auth-logo">Social<span>Pay</span></div>
    <div style="font-size:52px;margin:16px 0">🔒</div>
    <div style="font-size:18px;font-weight:800;color:white">Set New Password</div>
    <div class="auth-tagline" style="margin-top:8px">Choose a strong password (min 6 characters)</div>
  </div>

  <div class="auth-card">
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap">
        <input type="password" class="form-control" id="rp-pw"
               placeholder="••••••••" autocomplete="new-password">
        <button class="input-suffix" onclick="togglePw('rp-pw',this)">👁️</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <div class="input-wrap">
        <input type="password" class="form-control" id="rp-pw2"
               placeholder="••••••••" autocomplete="new-password">
        <button class="input-suffix" onclick="togglePw('rp-pw2',this)">👁️</button>
      </div>
    </div>

    <button class="btn btn-primary" id="rp-btn" onclick="doReset()">
      🔒 Reset Password
    </button>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
async function doReset() {
  const pw  = document.getElementById('rp-pw').value;
  const pw2 = document.getElementById('rp-pw2').value;
  if (!pw || !pw2) { showToast('{{ t("fill_all_fields") }}', 'warning'); return; }
  if (pw !== pw2)  { showToast('Passwords do not match.', 'warning'); return; }
  if (pw.length < 6) { showToast('{{ t("password_short") }}', 'warning'); return; }
  const fd = new FormData();
  fd.append('password', pw);
  fd.append('confirm_password', pw2);
  await postForm('/reset_password', fd, document.getElementById('rp-btn'));
}
</script>
</body>
</html>
